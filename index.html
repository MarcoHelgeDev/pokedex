<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="./scripts/script.js" defer></script>
    <script src="./scripts/template.js" defer></script>
  </head>
  <body>
    <main class="container">
      <div class="search-field-wrapper">
        <h2>Search for your Pokemon</h2>
        <input class="js-inputField" type="text" />
        <button class="js-pkmn-search-btn">Search</button>
      </div>
      <section class="section-wrapper">
        <div class="js-pkmn-render-container pkmn-wrapper"></div>
      </section>
      <div class="load-more-wrapper">
        <button class="js-pkmn-load-btn load-btn">Load</button>
      </div>
      <div class="js-spinner-container spinnerContainer hidden">
        <img src="./assets/icons/poke-spinner.webp" alt="Pokéball" />
      </div>
    </main>
  </body>
</html>
